{% extends 'base.html' %}
{% block title %}Add Faculty{% endblock %}
{% block page_title %}Add Faculty{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<div class="bg-white rounded-3 shadow-sm p-4">
    <h6 class="fw-bold mb-4">New Faculty Member</h6>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Username</label><input type="text" name="username" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Employee ID</label><input type="text" name="employee_id" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Department</label><input type="text" name="department" class="form-control"></div>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="fas fa-user-plus me-1"></i>Add Faculty</button>
            <a href="{% url 'faculty_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Mark Attendance{% endblock %}
{% block page_title %}Mark Attendance{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="bg-white rounded-3 shadow-sm p-4">
    <h6 class="fw-bold mb-4">Mark Attendance</h6>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Student</label>
            <select name="student" class="form-select" required>
                <option value="">-- Select Student --</option>
                {% for s in students %}<option value="{{ s.id }}">{{ s.user.get_full_name|default:s.user.username }}</option>{% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Course</label>
            <select name="course" class="form-select" required>
                <option value="">-- Select Course --</option>
                {% for c in courses %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="mb-3"><label class="form-label">Date</label><input type="date" name="date" class="form-control" value="{{ today }}" required></div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
                <option value="present">Present</option>
                <option value="absent">Absent</option>
                <option value="late">Late</option>
            </select>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'attendance' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Add Exam{% endblock %}
{% block page_title %}Add Exam{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="bg-white rounded-3 shadow-sm p-4">
    <h6 class="fw-bold mb-4">Schedule New Exam</h6>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">Exam Name</label><input type="text" name="exam_name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Course</label><select name="course" class="form-select" required><option value="">-- Select --</option>{% for c in courses %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
        <div class="mb-3"><label class="form-label">Exam Date</label><input type="date" name="exam_date" class="form-control" required></div>
        <div class="row g-3 mb-3">
            <div class="col-6"><label class="form-label">Start Time</label><input type="time" name="start_time" class="form-control" required></div>
            <div class="col-6"><label class="form-label">End Time</label><input type="time" name="end_time" class="form-control" required></div>
        </div>
        <div class="mb-3"><label class="form-label">Room</label><input type="text" name="room" class="form-control" placeholder="e.g. Hall A"></div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Schedule</button>
            <a href="{% url 'exam_schedule' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height:100vh; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            font-family:'Segoe UI',sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        /* Header */
        .site-header { text-align:center; margin-bottom:2rem; color:white; }
        .site-header .logo-circle {
            width:72px; height:72px; border-radius:50%;
            background:rgba(255,255,255,0.15);
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 1rem; font-size:2rem; color:white;
            backdrop-filter:blur(10px);
            border:2px solid rgba(255,255,255,0.2);
        }
        .site-header h1 { font-size:1.75rem; font-weight:800; letter-spacing:0.5px; }
        .site-header p { font-size:0.85rem; opacity:0.6; margin-top:0.3rem; }
        /* Card */
        .login-card {
            background:white; border-radius:20px; width:100%;
            max-width:420px; padding:2rem 2rem 1.5rem;
            box-shadow:0 25px 60px rgba(0,0,0,0.4);
        }
        /* Profile Icons above tabs */
        .profile-icons {
            display:flex; justify-content:center; gap:1.5rem;
            margin-bottom:1.5rem;
        }
        .profile-icon {
            display:flex; flex-direction:column; align-items:center;
            gap:0.4rem; cursor:pointer; transition:all 0.2s;
        }
        .profile-icon .icon-circle {
            width:56px; height:56px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:1.4rem; border:3px solid #e2e8f0;
            transition:all 0.2s; background:#f7fafc; color:#718096;
        }
        .profile-icon span { font-size:0.72rem; font-weight:600; color:#718096; }
        .profile-icon.active-admin .icon-circle { background:#fff5f5; border-color:#e53e3e; color:#e53e3e; }
        .profile-icon.active-admin span { color:#e53e3e; }
        .profile-icon.active-faculty .icon-circle { background:#f0fff4; border-color:#38a169; color:#38a169; }
        .profile-icon.active-faculty span { color:#38a169; }
        .profile-icon.active-student .icon-circle { background:#ebf4ff; border-color:#667eea; color:#667eea; }
        .profile-icon.active-student span { color:#667eea; }
        .profile-icon:hover .icon-circle { transform:scale(1.1); }
        /* Tab label */
        .tab-label {
            text-align:center; margin-bottom:1.25rem;
            font-size:1rem; font-weight:700; color:#2d3748;
        }
        .tab-label span { font-size:0.8rem; font-weight:400; color:#718096; display:block; }
        /* Input */
        .form-label { font-size:0.82rem; font-weight:600; color:#4a5568; margin-bottom:0.3rem; }
        .input-group-text { background:#f7fafc; border-right:none; color:#667eea; font-size:0.9rem; }
        .form-control { border-left:none; border-color:#e2e8f0; font-size:0.9rem; }
        .form-control:focus { border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.12); }
        .input-group:focus-within .input-group-text { border-color:#667eea; }
        /* Button */
        .btn-login {
            width:100%; padding:0.75rem; border:none; border-radius:10px;
            font-size:0.95rem; font-weight:700; color:white; cursor:pointer;
            transition:all 0.2s; margin-top:0.25rem;
        }
        .btn-admin-clr { background:linear-gradient(135deg,#e53e3e,#c53030); }
        .btn-faculty-clr { background:linear-gradient(135deg,#38a169,#276749); }
        .btn-student-clr { background:linear-gradient(135deg,#667eea,#764ba2); }
        .btn-login:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,0.2); }
        /* Error */
        .alert-err {
            background:#fff5f5; color:#c53030; border:1px solid #fed7d7;
            border-radius:8px; padding:0.6rem 0.9rem; font-size:0.82rem;
            display:flex; align-items:center; gap:0.5rem; margin-bottom:1rem;
        }
        /* Forgot & signup */
        .forgot-link { text-align:right; margin-bottom:1rem; }
        .forgot-link a { font-size:0.8rem; color:#667eea; text-decoration:none; }
        .forgot-link a:hover { text-decoration:underline; }
        .bottom-link { text-align:center; color:#718096; font-size:0.8rem; margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid #f0f0f0; }
        .bottom-link a { color:#667eea; font-weight:600; text-decoration:none; }
    </style>
</head>
<body>

    <!-- Site Header -->
    <div class="site-header">
        <div class="logo-circle"><i class="fas fa-university"></i></div>
        <h1>University Portal</h1>
        <p>Academic Management System</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">

        <!-- Profile Icons -->
        <div class="profile-icons" id="profileIcons">
            <div class="profile-icon {% if active_tab == 'admin' %}active-admin{% endif %}" onclick="setTab('admin')">
                <div class="icon-circle"><i class="fas fa-user-shield"></i></div>
                <span>Admin</span>
            </div>
            <div class="profile-icon {% if active_tab == 'faculty' %}active-faculty{% endif %}" onclick="setTab('faculty')">
                <div class="icon-circle"><i class="fas fa-chalkboard-teacher"></i></div>
                <span>Faculty</span>
            </div>
            <div class="profile-icon {% if active_tab == 'student' %}active-student{% endif %}" onclick="setTab('student')">
                <div class="icon-circle"><i class="fas fa-user-graduate"></i></div>
                <span>Student</span>
            </div>
        </div>

        <!-- Dynamic Tab Label -->
        <div class="tab-label" id="tabLabel">
            Sign In <span id="tabSub">Select your role above</span>
        </div>

        {% if error %}
        <div class="alert-err"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="post" id="loginForm">
            {% csrf_token %}
            <input type="hidden" name="role_tab" id="roleTabInput" value="{{ active_tab|default:'student' }}">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user" id="userIcon"></i></span>
                    <input type="text" name="username" class="form-control"
                           value="{{ username|default:'' }}" placeholder="Enter your username" required autofocus>
                </div>
            </div>

            <div class="mb-2">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" id="pwdInput" class="form-control"
                           placeholder="Enter your password" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()" style="border-left:none;">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="forgot-link">
                <a href="{% url 'forgot_password' %}"><i class="fas fa-key me-1"></i>Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login btn-student-clr" id="loginBtn">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In as <span id="btnLabel">Student</span>
            </button>
        </form>

        <div class="bottom-link">
            New student? <a href="{% url 'signup' %}">Create account here</a>
        </div>
    </div>

<script>
const cfg = {
    admin:   { label:'Admin',   sub:'Administrator Login', btnCls:'btn-admin-clr',   iconCls:'active-admin',   icon:'fa-user-shield',          color:'#e53e3e' },
    faculty: { label:'Faculty', sub:'Faculty Member Login', btnCls:'btn-faculty-clr', iconCls:'active-faculty', icon:'fa-chalkboard-teacher',    color:'#38a169' },
    student: { label:'Student', sub:'Student Login',        btnCls:'btn-student-clr', iconCls:'active-student', icon:'fa-user-graduate',         color:'#667eea' },
};
function setTab(role) {
    document.getElementById('roleTabInput').value = role;
    const icons = document.querySelectorAll('.profile-icon');
    icons.forEach(i => i.className = 'profile-icon');
    icons[['admin','faculty','student'].indexOf(role)].classList.add(cfg[role].iconCls);
    document.getElementById('tabLabel').innerHTML = `Sign In <span id="tabSub" style="color:${cfg[role].color}">${cfg[role].sub}</span>`;
    const btn = document.getElementById('loginBtn');
    btn.className = 'btn-login ' + cfg[role].btnCls;
    document.getElementById('btnLabel').textContent = cfg[role].label;
    document.getElementById('userIcon').className = 'fas ' + cfg[role].icon;
}
function togglePwd() {
    const p = document.getElementById('pwdInput');
    const e = document.getElementById('eyeIcon');
    p.type = p.type === 'password' ? 'text' : 'password';
    e.className = p.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
setTab('{{ active_tab|default:"student" }}');
</script>
</body>
</html>

{% extends 'base.html' %}
{% block title %}Add Assignment{% endblock %}
{% block page_title %}Add Assignment{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="bg-white rounded-3 shadow-sm p-4">
    <h6 class="fw-bold mb-4">New Assignment</h6>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">Title</label><input type="text" name="title" class="form-control" required></div>
        <div class="mb-3">
            <label class="form-label">Course</label>
            <select name="course" class="form-select">
                <option value="">-- General (No Course) --</option>
                {% for c in courses %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
        <div class="mb-3"><label class="form-label">Due Date</label><input type="date" name="due_date" class="form-control" required></div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'assignments' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Add Grade{% endblock %}
{% block page_title %}Add Grade{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="bg-white rounded-3 shadow-sm p-4">
    <h6 class="fw-bold mb-4">Add Grade</h6>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Student</label>
            <select name="student" class="form-select" required>
                <option value="">-- Select Student --</option>
                {% for s in students %}<option value="{{ s.id }}">{{ s.user.get_full_name|default:s.user.username }}</option>{% endfor %}
            </select>
        </div>
        <div class="mb-3"><label class="form-label">Subject</label><input type="text" name="subject" class="form-control" required></div>
        <div class="row g-3">
            <div class="col-6"><label class="form-label">Score</label><input type="number" name="score" class="form-control" step="0.1" required></div>
            <div class="col-6"><label class="form-label">Max Score</label><input type="number" name="max_score" class="form-control" value="100" required></div>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">Save Grade</button>
            <a href="{% url 'grades' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</div>
</div>
{% endblock %}

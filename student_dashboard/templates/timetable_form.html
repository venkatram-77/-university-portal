{% extends 'base.html' %}
{% block title %}Add Timetable Slot{% endblock %}
{% block page_title %}Add Timetable Slot{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="bg-white rounded-3 shadow-sm p-4">
    <h6 class="fw-bold mb-4">New Timetable Slot</h6>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">Branch</label><select name="branch" class="form-select" required><option value="">-- Select --</option>{% for b in branches %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}</select></div>
        <div class="mb-3"><label class="form-label">Course</label><select name="course" class="form-select" required><option value="">-- Select --</option>{% for c in courses %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
        <div class="mb-3"><label class="form-label">Day</label><select name="day" class="form-select" required>{% for d in days %}<option value="{{ d }}">{{ d }}</option>{% endfor %}</select></div>
        <div class="row g-3 mb-3">
            <div class="col-6"><label class="form-label">Start Time</label><input type="time" name="start_time" class="form-control" required></div>
            <div class="col-6"><label class="form-label">End Time</label><input type="time" name="end_time" class="form-control" required></div>
        </div>
        <div class="mb-3"><label class="form-label">Room</label><input type="text" name="room" class="form-control" placeholder="e.g. Room 101"></div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'timetable' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</div>
</div>
{% endblock %}

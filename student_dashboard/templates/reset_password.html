<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - University Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); flex-direction:column; }
        .card { background:white; border-radius:20px; padding:2rem; width:100%; max-width:400px; box-shadow:0 25px 60px rgba(0,0,0,0.4); }
        .icon-box { width:64px; height:64px; border-radius:50%; background:#ebf4ff; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; font-size:1.75rem; color:#667eea; }
        h5 { font-weight:800; color:#2d3748; text-align:center; margin-bottom:0.3rem; }
        .sub { text-align:center; color:#718096; font-size:0.85rem; margin-bottom:1.5rem; }
        .form-label { font-size:0.82rem; font-weight:600; color:#4a5568; }
        .input-group-text { background:#f7fafc; border-right:none; color:#667eea; }
        .form-control { border-left:none; border-color:#e2e8f0; }
        .form-control:focus { border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.12); }
        .input-group:focus-within .input-group-text { border-color:#667eea; }
        .btn-submit { width:100%; padding:0.75rem; background:linear-gradient(135deg,#667eea,#764ba2); border:none; border-radius:10px; color:white; font-weight:700; font-size:0.95rem; cursor:pointer; margin-top:0.5rem; transition:all 0.2s; }
        .btn-submit:hover { transform:translateY(-1px); }
        .alert-err { background:#fff5f5; color:#c53030; border:1px solid #fed7d7; border-radius:8px; padding:0.6rem 0.9rem; font-size:0.82rem; margin-bottom:1rem; }
        .alert-ok { background:#f0fff4; color:#276749; border:1px solid #c6f6d5; border-radius:8px; padding:1rem; text-align:center; }
        .back-link { text-align:center; margin-top:1.25rem; font-size:0.82rem; }
        .back-link a { color:#667eea; text-decoration:none; font-weight:600; }
        .site-header { text-align:center; color:white; margin-bottom:1.5rem; }
        .site-header h1 { font-size:1.4rem; font-weight:800; }
    </style>
</head>
<body>
<div class="site-header">
    <h1><i class="fas fa-university me-2"></i>University Portal</h1>
</div>
<div class="card">
    <div class="icon-box"><i class="fas fa-lock"></i></div>
    <h5>Reset Password</h5>
    <p class="sub">Set your new password below.</p>

    {% if success %}
    <div class="alert-ok">
        <i class="fas fa-check-circle me-2" style="font-size:1.5rem;"></i><br>
        <strong>Password reset successfully!</strong><br>
        <small>You can now login with your new password.</small>
    </div>
    <div class="back-link mt-3"><a href="{% url 'login' %}"><i class="fas fa-sign-in-alt me-1"></i>Go to Login</a></div>
    {% else %}
    {% if error %}<div class="alert-err"><i class="fas fa-exclamation-circle me-1"></i> {{ error }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" id="p1" class="form-control" placeholder="Enter new password" required>
                <button class="btn btn-outline-secondary" type="button" onclick="t('p1','e1')" style="border-left:none;"><i class="fas fa-eye" id="e1"></i></button>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="confirm_password" id="p2" class="form-control" placeholder="Confirm new password" required>
                <button class="btn btn-outline-secondary" type="button" onclick="t('p2','e2')" style="border-left:none;"><i class="fas fa-eye" id="e2"></i></button>
            </div>
        </div>
        <button type="submit" class="btn-submit"><i class="fas fa-save me-2"></i>Reset Password</button>
    </form>
    <div class="back-link"><a href="{% url 'login' %}"><i class="fas fa-arrow-left me-1"></i>Back to Login</a></div>
    {% endif %}
</div>
<script>
function t(id, eid) {
    const p = document.getElementById(id);
    const e = document.getElementById(eid);
    p.type = p.type === 'password' ? 'text' : 'password';
    e.className = p.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
</script>
</body>
</html>

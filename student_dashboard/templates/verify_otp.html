<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - University Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); flex-direction:column; }
        .card { background:white; border-radius:20px; padding:2rem; width:100%; max-width:400px; box-shadow:0 25px 60px rgba(0,0,0,0.4); }
        .icon-box { width:64px; height:64px; border-radius:50%; background:#f0fff4; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; font-size:1.75rem; color:#38a169; }
        h5 { font-weight:800; color:#2d3748; text-align:center; margin-bottom:0.3rem; }
        .sub { text-align:center; color:#718096; font-size:0.85rem; margin-bottom:1.5rem; }
        .otp-input { text-align:center; font-size:2rem; font-weight:800; letter-spacing:0.5rem; border:2px solid #e2e8f0; border-radius:12px; padding:0.75rem; width:100%; color:#2d3748; }
        .otp-input:focus { border-color:#38a169; outline:none; box-shadow:0 0 0 3px rgba(56,161,105,0.12); }
        .btn-submit { width:100%; padding:0.75rem; background:linear-gradient(135deg,#38a169,#276749); border:none; border-radius:10px; color:white; font-weight:700; font-size:0.95rem; cursor:pointer; margin-top:1rem; transition:all 0.2s; }
        .btn-submit:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(56,161,105,0.4); }
        .alert-err { background:#fff5f5; color:#c53030; border:1px solid #fed7d7; border-radius:8px; padding:0.6rem 0.9rem; font-size:0.82rem; display:flex; gap:0.5rem; margin-bottom:1rem; }
        .back-link { text-align:center; margin-top:1.25rem; font-size:0.82rem; }
        .back-link a { color:#667eea; text-decoration:none; font-weight:600; }
        .site-header { text-align:center; color:white; margin-bottom:1.5rem; }
        .site-header h1 { font-size:1.4rem; font-weight:800; }
        .hint { background:#f0fff4; border:1px solid #c6f6d5; border-radius:8px; padding:0.6rem 0.9rem; font-size:0.8rem; color:#276749; margin-bottom:1rem; }
    </style>
</head>
<body>
<div class="site-header">
    <h1><i class="fas fa-university me-2"></i>University Portal</h1>
</div>
<div class="card">
    <div class="icon-box"><i class="fas fa-shield-alt"></i></div>
    <h5>Enter OTP</h5>
    <p class="sub">Enter the 6-digit OTP sent to your registered email.</p>
    <div class="hint"><i class="fas fa-info-circle me-1"></i>In development mode, check your terminal window for the OTP.</div>
    {% if error %}<div class="alert-err"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <input type="text" name="otp" class="otp-input" placeholder="------" maxlength="6" pattern="\d{6}" required autofocus>
        <button type="submit" class="btn-submit"><i class="fas fa-check me-2"></i>Verify OTP</button>
    </form>
    <div class="back-link"><a href="{% url 'forgot_password' %}"><i class="fas fa-arrow-left me-1"></i>Try again</a></div>
</div>
</body>
</html>

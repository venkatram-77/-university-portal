{% extends 'base.html' %}
{% block title %}Add Event{% endblock %}
{% block page_title %}Add Event{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="bg-white rounded-3 shadow-sm p-4">
    <h6 class="fw-bold mb-4">New Event</h6>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">Event Title</label><input type="text" name="title" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Date</label><input type="date" name="event_date" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Location</label><input type="text" name="location" class="form-control" placeholder="e.g. Main Auditorium"></div>
        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Event</button>
            <a href="{% url 'events' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
</div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - University Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); flex-direction:column; }
        .card { background:white; border-radius:20px; padding:2rem; width:100%; max-width:400px; box-shadow:0 25px 60px rgba(0,0,0,0.4); }
        .icon-box { width:64px; height:64px; border-radius:50%; background:#ebf4ff; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; font-size:1.75rem; color:#667eea; }
        h5 { font-weight:800; color:#2d3748; text-align:center; margin-bottom:0.3rem; }
        .sub { text-align:center; color:#718096; font-size:0.85rem; margin-bottom:1.5rem; }
        .form-label { font-size:0.82rem; font-weight:600; color:#4a5568; }
        .input-group-text { background:#f7fafc; border-right:none; color:#667eea; }
        .form-control { border-left:none; border-color:#e2e8f0; }
        .form-control:focus { border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.12); }
        .input-group:focus-within .input-group-text { border-color:#667eea; }
        .btn-submit { width:100%; padding:0.75rem; background:linear-gradient(135deg,#667eea,#764ba2); border:none; border-radius:10px; color:white; font-weight:700; font-size:0.95rem; cursor:pointer; transition:all 0.2s; }
        .btn-submit:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(102,126,234,0.4); }
        .alert-err { background:#fff5f5; color:#c53030; border:1px solid #fed7d7; border-radius:8px; padding:0.6rem 0.9rem; font-size:0.82rem; display:flex; gap:0.5rem; margin-bottom:1rem; }
        .back-link { text-align:center; margin-top:1.25rem; font-size:0.82rem; }
        .back-link a { color:#667eea; text-decoration:none; font-weight:600; }
        .site-header { text-align:center; color:white; margin-bottom:1.5rem; }
        .site-header h1 { font-size:1.4rem; font-weight:800; }
    </style>
</head>
<body>
<div class="site-header">
    <h1><i class="fas fa-university me-2"></i>University Portal</h1>
</div>
<div class="card">
    <div class="icon-box"><i class="fas fa-key"></i></div>
    <h5>Forgot Password?</h5>
    <p class="sub">Enter your email address, phone number, or username to receive a reset OTP.</p>
    {% if error %}<div class="alert-err"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Email / Phone / Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-search"></i></span>
                <input type="text" name="identifier" class="form-control" placeholder="e.g. user@email.com or 9876543210" required autofocus>
            </div>
            <div class="form-text mt-1" style="font-size:0.78rem;">OTP will be sent to your registered email. Check terminal in dev mode.</div>
        </div>
        <button type="submit" class="btn-submit"><i class="fas fa-paper-plane me-2"></i>Send OTP</button>
    </form>
    <div class="back-link"><a href="{% url 'login' %}"><i class="fas fa-arrow-left me-1"></i>Back to Login</a></div>
</div>
</body>
</html>

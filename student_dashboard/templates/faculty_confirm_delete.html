{% extends 'base.html' %}
{% block title %}Delete Faculty{% endblock %}
{% block page_title %}Delete Faculty{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="bg-white rounded-3 shadow-sm p-4 text-center">
    <div style="font-size:3rem;color:#fc8181;"><i class="fas fa-exclamation-triangle"></i></div>
    <h5 class="mt-3">Delete Faculty?</h5>
    <p class="text-muted">This will permanently delete <strong>{{ faculty.user.get_full_name|default:faculty.user.username }}</strong>.</p>
    <form method="post" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="fas fa-trash me-1"></i>Yes, Delete</button>
        <a href="{% url 'faculty_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
</div>
</div>
{% endblock %}
